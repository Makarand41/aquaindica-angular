<div class="admin-gallery-container">
  <h2>Admin Gallery</h2>
<button class="back-btn" (click)="back()">
  <span>←</span> Back
</button>
  <div class="upload-card">

    <input
      type="text"
      placeholder="Title"
      [(ngModel)]="title"
    />

    <input
      type="file"
      accept="image/*,video/*"
      (change)="onFileSelected($event)"
    />

    <div class="preview" *ngIf="previewUrl">
      <p>Preview</p>

      <img *ngIf="selectedFileType === 'image'" [src]="previewUrl" />

      <video *ngIf="selectedFileType === 'video'" controls width="250">
        <source [src]="previewUrl" />
      </video>
    </div>

    <button (click)="uploadImage()">Upload</button>

  </div>

  <div class="gallery-grid">

    <div class="gallery-card" *ngFor="let item of galleryList">

      <!-- Show Image -->
      <img *ngIf="item.type === 'image'" [src]="item.fileSrc" />

      <!-- Show Video -->
      <video *ngIf="item.type === 'video'" controls>
        <source [src]="item.fileSrc" />
      </video>

      <h4>{{ item.title }}</h4>

      <button class="delete" (click)="deleteImage(item.id)">
        Delete
      </button>

    </div>

  </div>
</div>
